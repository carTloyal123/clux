name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run test suite
        run: cargo test -q

  build-release-targets:
    name: Build release targets
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build clux-server for x86_64-unknown-linux-gnu
        run: cross build --release --bin clux-server --target x86_64-unknown-linux-gnu

      - name: Build clux-server for aarch64-unknown-linux-gnu
        run: cross build --release --bin clux-server --target aarch64-unknown-linux-gnu

  prepare-release:
    name: Prepare release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - test
      - build-release-targets
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      version: ${{ steps.prepare.outputs.version }}
      tag: ${{ steps.prepare.outputs.tag }}
      should_release: ${{ steps.prepare.outputs.should_release }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create version tag if needed
        id: prepare
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          version="$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -n1)"
          release_tag="v${version}"

          if [[ -z "${version}" ]]; then
            echo "Failed to parse package version from Cargo.toml" >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${release_tag}" >> "${GITHUB_OUTPUT}"

          if git ls-remote --exit-code --tags origin "refs/tags/${release_tag}" >/dev/null 2>&1; then
            if gh release view "${release_tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
              echo "Tag ${release_tag} and its GitHub Release already exist; skipping automatic release." >&2
              echo "should_release=false" >> "${GITHUB_OUTPUT}"
            else
              echo "Tag ${release_tag} exists but no GitHub Release was found; publishing release." >&2
              echo "should_release=true" >> "${GITHUB_OUTPUT}"
            fi
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${release_tag}" -m "${release_tag}"
          git push origin "refs/tags/${release_tag}"

          echo "should_release=true" >> "${GITHUB_OUTPUT}"

  publish-release:
    name: Publish release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.prepare-release.outputs.should_release == 'true'
    needs:
      - prepare-release
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.prepare-release.outputs.tag }}
      version: ${{ needs.prepare-release.outputs.version }}
