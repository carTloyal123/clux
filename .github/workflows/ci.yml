name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    name: Test
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run test suite
        run: cargo test -q

  prepare-release:
    name: Prepare release
    if: >-
      ${{
        github.event_name == 'push' &&
        github.ref == 'refs/heads/main' &&
        github.actor != 'github-actions[bot]'
      }}
    needs:
      - test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      version: ${{ steps.prepare.outputs.version }}
      tag: ${{ steps.prepare.outputs.tag }}
      release_ref: ${{ steps.prepare.outputs.release_ref }}
      should_release: ${{ steps.prepare.outputs.should_release }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute release version and tag
        id: prepare
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          current_version="$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -n1)"
          if [[ -z "${current_version}" ]]; then
            echo "Failed to parse package version from Cargo.toml" >&2
            exit 1
          fi

          previous_version=""
          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            previous_version="$(
              git show HEAD^:Cargo.toml | sed -n 's/^version = "\(.*\)"$/\1/p' | head -n1
            )"
          fi

          release_version="${current_version}"
          release_commit="$(git rev-parse HEAD)"

          if [[ -z "${previous_version}" || "${previous_version}" == "${current_version}" ]]; then
            IFS=. read -r major minor patch <<<"${current_version}"
            if [[ -z "${major}" || -z "${minor}" || -z "${patch}" ]]; then
              echo "Version ${current_version} is not a simple semver triplet" >&2
              exit 1
            fi

            release_version="${major}.${minor}.$((patch + 1))"

            perl -0pi -e 's/^version = ".*?"$/version = "'"${release_version}"'"/m' Cargo.toml

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Cargo.toml
            git commit -m "Bump version to v${release_version}"
            git push origin HEAD:main
            release_commit="$(git rev-parse HEAD)"
          fi

          release_tag="v${release_version}"

          echo "version=${release_version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "release_ref=${release_tag}" >> "${GITHUB_OUTPUT}"

          if git ls-remote --exit-code --tags origin "refs/tags/${release_tag}" >/dev/null 2>&1; then
            if gh release view "${release_tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
              echo "Tag ${release_tag} and its GitHub Release already exist; skipping automatic release." >&2
              echo "should_release=false" >> "${GITHUB_OUTPUT}"
            else
              echo "Tag ${release_tag} exists but no GitHub Release was found; publishing release." >&2
              echo "should_release=true" >> "${GITHUB_OUTPUT}"
            fi
            exit 0
          fi

          git tag -a "${release_tag}" "${release_commit}" -m "${release_tag}"
          git push origin "refs/tags/${release_tag}"

          echo "should_release=true" >> "${GITHUB_OUTPUT}"

  build-release-targets:
    name: Build ${{ matrix.target }}
    if: >-
      ${{
        github.event_name == 'push' &&
        github.ref == 'refs/heads/main' &&
        github.actor != 'github-actions[bot]' &&
        needs.prepare-release.outputs.should_release == 'true'
      }}
    needs:
      - prepare-release
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu

    steps:
      - name: Check out release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build clux-server
        run: cross build --release --bin clux-server --target ${{ matrix.target }}

      - name: Package release artifact
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -euo pipefail

          binary="target/${TARGET}/release/clux-server"
          archive="clux-server-v${VERSION}-${TARGET}.tar.gz"
          staging_dir="$(mktemp -d)"

          if [[ ! -f "${binary}" ]]; then
            echo "Missing release binary at ${binary}" >&2
            exit 1
          fi

          cp "${binary}" "${staging_dir}/clux-server"
          chmod +x "${staging_dir}/clux-server"
          tar -czf "${archive}" -C "${staging_dir}" clux-server

          if [[ ! -f "${archive}" ]]; then
            echo "Failed to create ${archive}" >&2
            exit 1
          fi

          contents="$(tar -tzf "${archive}")"
          if [[ "${contents}" != "clux-server" ]]; then
            echo "Unexpected archive contents in ${archive}: ${contents}" >&2
            exit 1
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: clux-server-${{ matrix.target }}
          path: clux-server-v${{ needs.prepare-release.outputs.version }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  publish-release:
    name: Publish release
    if: >-
      ${{
        github.event_name == 'push' &&
        github.ref == 'refs/heads/main' &&
        github.actor != 'github-actions[bot]' &&
        needs.prepare-release.outputs.should_release == 'true'
      }}
    needs:
      - build-release-targets
      - prepare-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten release artifacts
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          mkdir -p release
          for file in dist/*/*.tar.gz; do
            mv "${file}" release/
          done

          count="$(find release -maxdepth 1 -name '*.tar.gz' | wc -l | tr -d ' ')"
          if [[ "${count}" != "2" ]]; then
            echo "Expected 2 release archives, found ${count}" >&2
            exit 1
          fi

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          (
            cd release
            sha256sum ./*.tar.gz > SHA256SUMS
          )

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          files: |
            release/*.tar.gz
            release/SHA256SUMS
