name: Release

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      version:
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate-release:
    name: Validate release metadata
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_call' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Validate tag and package metadata
        id: meta
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_call' && inputs.tag || github.ref_name }}
          REQUESTED_VERSION: ${{ github.event_name == 'workflow_call' && inputs.version || '' }}
        run: |
          set -euo pipefail

          version="$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -n1)"
          name="$(sed -n 's/^name = "\(.*\)"$/\1/p' Cargo.toml | head -n1)"
          repository="$(sed -n 's/^repository = "\(.*\)"$/\1/p' Cargo.toml | head -n1)"
          expected_tag="v${version}"
          expected_repository="https://github.com/carTloyal123/clux"

          if [[ -z "${version}" ]]; then
            echo "Failed to parse package version from Cargo.toml" >&2
            exit 1
          fi

          if [[ "${RELEASE_TAG}" != "${expected_tag}" ]]; then
            echo "Tag ${RELEASE_TAG} does not match Cargo.toml version ${version}" >&2
            exit 1
          fi

          if [[ -n "${REQUESTED_VERSION}" && "${REQUESTED_VERSION}" != "${version}" ]]; then
            echo "Requested version ${REQUESTED_VERSION} does not match Cargo.toml version ${version}" >&2
            exit 1
          fi

          if [[ "${name}" != "clux" ]]; then
            echo "Unexpected package name: ${name}" >&2
            exit 1
          fi

          if [[ "${repository}" != "${expected_repository}" ]]; then
            echo "Unexpected repository metadata: ${repository}" >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"

  build-server:
    name: Build ${{ matrix.target }}
    needs: validate-release
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_call' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build clux-server
        run: cross build --release --bin clux-server --target ${{ matrix.target }}

      - name: Package release artifact
        shell: bash
        env:
          VERSION: ${{ needs.validate-release.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          binary="target/${TARGET}/release/clux-server"
          archive="clux-server-v${VERSION}-${TARGET}.tar.gz"
          staging_dir="$(mktemp -d)"

          if [[ ! -f "${binary}" ]]; then
            echo "Missing release binary at ${binary}" >&2
            exit 1
          fi

          cp "${binary}" "${staging_dir}/clux-server"
          chmod +x "${staging_dir}/clux-server"

          tar -czf "${archive}" -C "${staging_dir}" clux-server

          if [[ ! -f "${archive}" ]]; then
            echo "Failed to create ${archive}" >&2
            exit 1
          fi

          contents="$(tar -tzf "${archive}")"
          if [[ "${contents}" != "clux-server" ]]; then
            echo "Unexpected archive contents in ${archive}: ${contents}" >&2
            exit 1
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: clux-server-${{ matrix.target }}
          path: clux-server-v${{ needs.validate-release.outputs.version }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  publish-release:
    name: Publish release
    needs:
      - validate-release
      - build-server
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten release artifacts
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          mkdir -p release
          for file in dist/*/*.tar.gz; do
            mv "${file}" release/
          done

          count="$(find release -maxdepth 1 -name '*.tar.gz' | wc -l | tr -d ' ')"
          if [[ "${count}" != "2" ]]; then
            echo "Expected 2 release archives, found ${count}" >&2
            exit 1
          fi

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          (
            cd release
            sha256sum ./*.tar.gz > SHA256SUMS
          )

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-release.outputs.tag }}
          files: |
            release/*.tar.gz
            release/SHA256SUMS
